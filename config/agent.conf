<ossec_config>
  <localfile>
    <log_format>journald</log_format>
    <location>journald</location>
  </localfile>

  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/active-responses.log</location>
  </localfile>

<active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>5710,5712,5716,5720,60122,60204</rules_id>
    <timeout>1800</timeout>
  </active-response>

  <active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>40111</rules_id>
    <timeout>3600</timeout>
  </active-response>

  <active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>31103,31106,31151</rules_id>
    <timeout>1800</timeout>
  </active-response>

<integration>
  <name>virustotal</name>
  <api_key>"Poner api key correspondiente de VT" </api_key> <group>syscheck</group> <alert_format>json</alert_format>
</integration>


<command>
    <name>remove-threat</name>
    <executable>remove-threat.exe</executable>
    <timeout_allowed>no</timeout_allowed>
  </command>

  <active-response>
    <command>remove-threat</command>
    <location>local</location>
    <rules_id>87105</rules_id> </active-response>

</ossec_config>
